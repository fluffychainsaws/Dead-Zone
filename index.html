<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DEAD ZONE" />
    <link rel="icon" type="image/png" href="/Dead-Zone/icons/icon-64.png" />
    <link rel="apple-touch-icon" href="/Dead-Zone/icons/icon-180.png" />
    <title>DEAD ZONE</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="title-screen">
        <div class="fog"></div>
        <div id="version-badge">PHASE 23.1</div>
        <h1 class="game-title">DEAD&nbsp;ZONE</h1>
        <p class="tagline">The horde is coming.</p>
        <div id="menu-buttons">
          <button id="play-btn">SOLO</button>
          <button id="host-btn">HOST GAME</button>
          <button id="join-btn">JOIN GAME</button>
          <button id="lobby-btn">LOBBY</button>
        </div>
        <div id="join-row">
          <input id="join-code" maxlength="5" placeholder="CODE" autocomplete="off" spellcheck="false" />
          <button id="join-go">GO</button>
        </div>
        <div id="lobby-panel">
          <div id="lobby-head">
            <span>LIVE GAMES</span>
            <span id="lobby-online"></span>
            <button id="lobby-close">✕</button>
          </div>
          <div id="lobby-list"><p class="lobby-empty">Scanning the dead zone…</p></div>
        </div>
        <div id="menu-row2">
          <button id="help-btn" class="ghost-btn">HOW TO PLAY</button>
          <button id="install-btn" class="ghost-btn">📲 INSTALL APP</button>
        </div>
        <div id="info-panel">
          <div id="info-head">
            <span id="info-title"></span>
            <button id="info-close">✕</button>
          </div>
          <div id="info-body"></div>
        </div>
      </div>
      <div id="rotate-hint">↻ ROTATE YOUR DEVICE — LANDSCAPE IS BEST</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
